version: 2

project_name: lts

before:
  hooks:
    - go mod tidy

builds:
  - id: lts
    main: .
    binary: lts
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: lts
    format: tar.gz
    name_template: "lts_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: led-slzr
    name: lts
  draft: false
  prerelease: auto
  name_template: "LTS v{{ .Version }}"
